<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMILFO Свадебный Блок</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #F2E6D6;
            --brown: #5C4A44;
            --line: #E91E63;
        }

        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--brown); margin: 0; }
        
        .font-copperplate {
            font-family: 'Copperplate', 'serif';
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .wedding-compact-box {
            max-width: 1200px;
            margin: 40px auto;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            min-height: 600px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }

        .promo-side {
            padding: 70px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #fff;
        }

        .content-side {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            background: #FAFAFA;
        }

        .pink-line {
            height: 1px;
            background: var(--line);
            width: 80px;
            opacity: 0.5;
        }

        .main-visual {
            flex-grow: 1;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }

        .video-player-box {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            /* Адекватное соотношение сторон 16:9 */
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background 0.3s ease;
        }

        .video-player-box:hover .video-overlay {
            background: rgba(0,0,0,0.4);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            margin-bottom: 15px;
        }

        .btn-black {
            background: #2D2D2D;
            color: white;
            padding: 18px 45px;
            font-size: 11px;
            border-radius: 50px;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-black:hover { background: #000; transform: translateY(-2px); }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #FAFAFA;
            border-radius: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--line);
            border-radius: 50%;
        }

        @media (max-width: 1024px) {
            .wedding-compact-box { grid-template-columns: 1fr; margin: 20px; }
            .promo-side { padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="wedding-compact-box">
        <!-- ЛЕВО: Информация -->
        <div class="promo-side">
            <div>
                <div class="pink-line mb-8"></div>
                <h2 class="font-copperplate text-4xl leading-tight mb-8">Искусство<br>вашего<br>торжества</h2>
                
                <div class="space-y-6 max-w-sm">
                    <p class="text-[13px] text-stone-500 font-light leading-relaxed">
                        Свадебный торт от COMILFO — это гармония эстетики и безупречного вкуса, созданная специально для вашего события.
                    </p>
                    
                    <div class="benefit-item border border-stone-100">
                        <div class="dot"></div>
                        <div>
                            <h4 class="text-[12px] font-copperplate mb-1">Встреча с шефом</h4>
                            <p class="text-[10px] text-stone-400 leading-relaxed uppercase tracking-wider">
                                Чай и десерт в качестве комплимента <br> при обсуждении заказа
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="pt-10">
                <a href="#" class="btn-black font-copperplate">Записаться на встречу</a>
            </div>
        </div>

        <!-- ПРАВО: Визуал и Видео 16:9 -->
        <div class="content-side">
            <div class="main-visual">
                <img src="https://images.unsplash.com/photo-1512484770464-3e5924a1dc20?auto=format&fit=crop&q=80" alt="[Изображение свадебного торта]" class="w-full h-full object-cover">
            </div>

            <div class="video-player-box group cursor-pointer">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80" alt="[Превью видео доставки]" class="w-full h-full object-cover">
                <div class="video-overlay">
                    <div class="play-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                    <span class="font-copperplate text-[10px] tracking-[0.4em]">Бережная доставка</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
